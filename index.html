<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Order FNI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <div class="brand-icon">FNI</div>
      <div class="brand-text">
        <span class="brand-title">Form Order</span>
        <span class="brand-sub">FATIJJA NUSANTARA INOVASI</span>
      </div>
    </div>
    <div class="nav-actions">
      <button class="btn-nav" id="btnAdminLogin" onclick="showAdminLogin()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Admin Login
      </button>
      <div class="admin-badge hidden" id="adminBadge">
        <span class="dot-green"></span>
        <span id="adminBadgeName">Admin</span>
        <button class="btn-logout" onclick="adminLogout()">Logout</button>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <div class="hero-tag">Sistem Order Internal</div>
      <h1 class="hero-title">Form Order <span class="accent-yellow">FATIJJA NUSANTARA INOVASI</span></h1>
      <p class="hero-desc">Ajukan kebutuhan desain dan video kamu dengan mudah. Pantau status pengerjaan secara real-time.</p>
      <div class="hero-stats">
        <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-lbl">Total Order</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="stat-num" id="statPending">0</span><span class="stat-lbl">Pending</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="stat-num" id="statDone">0</span><span class="stat-lbl">Done</span></div>
      </div>
    </div>
    <div class="hero-illustration">
      <svg viewBox="0 0 220 180" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="30" width="130" height="90" rx="10" fill="#2ABCAA" opacity="0.15"/>
        <rect x="30" y="42" width="110" height="8" rx="4" fill="#2ABCAA" opacity="0.5"/>
        <rect x="30" y="56" width="80" height="6" rx="3" fill="#2ABCAA" opacity="0.3"/>
        <rect x="30" y="68" width="100" height="6" rx="3" fill="#2ABCAA" opacity="0.3"/>
        <rect x="30" y="80" width="70" height="6" rx="3" fill="#2ABCAA" opacity="0.3"/>
        <rect x="30" y="100" width="50" height="14" rx="7" fill="#F5C518" opacity="0.8"/>
        <rect x="88" y="100" width="50" height="14" rx="7" fill="#2ABCAA" opacity="0.6"/>
        <circle cx="170" cy="60" r="30" fill="#F5C518" opacity="0.15"/>
        <path d="M158 60 L165 67 L182 50" stroke="#F5C518" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </section>

  <main class="main-content">

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="order" onclick="switchTab('order')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        Buat Order
      </button>
      <button class="tab-btn" data-tab="status" onclick="switchTab('status')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Cek Status
      </button>
      <button class="tab-btn admin-only hidden" data-tab="admin" onclick="switchTab('admin')" id="tabAdminBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        Dashboard Admin
        <span class="notif-dot hidden" id="notifDot"></span>
      </button>
      <button class="tab-btn admin-only hidden" data-tab="kelola" onclick="switchTab('kelola')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Kelola Admin
      </button>
    </div>

    <div class="tab-content active" id="tab-order">
      <div class="order-grid">

        <div class="order-card">
          <div class="card-header teal">
            <div class="card-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M12 2a10 10 0 0 1 0 20"/><path d="M15.46 8.54a5 5 0 0 1 0 7.07M6.34 6.34a8 8 0 0 0 0 11.32"/></svg>
            </div>
            <div>
              <h3 class="card-title">Order Desain</h3>
              <p class="card-sub">Poster, banner, konten sosmed, dll</p>
            </div>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label>Nama <span class="req">*</span></label>
              <input type="text" id="d_nama" placeholder="Nama lengkap kamu" />
            </div>
            <div class="form-group">
              <label>Unit <span class="req">*</span></label>
              <select id="d_unit">
                <option value="">— Pilih Unit —</option>
                <option>YAU</option><option>FQ</option><option>FNI</option>
                <option>Soccer</option><option>Baja</option><option>Karet</option>
              </select>
            </div>
            <div class="form-group">
